name: Preflight Council

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  council:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Preflight council review
        uses: ./action
        with:
          modular_api_key: ${{ secrets.MODULAR_API_KEY }}
          goal: "85"

      - name: Upload run artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preflight-run-pr${{ github.event.pull_request.number }}
          path: preflight-run.json
          if-no-files-found: ignore
